version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  rook-zero-multiplayer-server:
    build:
      context: ../..
      dockerfile: examples/multiplayer-server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ../..:/app
      - /app/examples/multiplayer-server/node_modules

volumes:
  redis_data: 
